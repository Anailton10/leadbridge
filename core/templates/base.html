<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Chat{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .htmx-indicator {
      opacity: 0;
      visibility: hidden;
      transform: translateY(4px);
      transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
    }

    .htmx-request .htmx-indicator,
    .htmx-indicator.htmx-request {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .typing-dot {
      animation: typing-bounce 1.1s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes typing-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40% { transform: translateY(-4px); opacity: 1; }
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-dvh flex flex-col">

  <header class="bg-gray-800/95 backdrop-blur border-b border-gray-700 px-4 py-3 sm:px-6">
    <div class="mx-auto w-full max-w-5xl">
      <h1 class="text-base sm:text-lg font-semibold">Atendimento</h1>
    </div>
  </header>

  <main class="flex-1 overflow-hidden">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
