{% extends "base.html" %}

{% block title %}Leads{% endblock %}
{% block content %}
<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    {% block navbar_title %}Leads{% endblock %}

    <!-- loading indicator -->
    <span id="leads-loading" class="htmx-indicator text-sm text-gray-400">
      Atualizando...
    </span>
  </div>

  <div class="overflow-x-auto rounded-lg border border-gray-800">
    <table class="w-full text-sm text-left">
      
      <thead class="text-gray-400 border-b border-gray-700 bg-gray-900">
        <tr>
          <th class="px-4 py-3">Nome</th>
          <th class="px-4 py-3">Endereço</th>
          <th class="px-4 py-3">Cidade</th>
          <th class="px-4 py-3">Estado</th>
          <th class="px-4 py-3">Promotor Responsável</th>
          <th class="px-4 py-3">Ação</th>
        </tr>
      </thead>

      <tbody 
        id="leads-table"
        class="divide-y divide-gray-800"
        hx-get="{% url 'leads:list_partial' %}"
        hx-trigger="load, every 15s"
        hx-swap="innerHTML"
        hx-indicator="#leads-loading"
      >
        {% include "partials/_leads_table.html" %}
      </tbody>

    </table>
  </div>
</div>
{% endblock %}
