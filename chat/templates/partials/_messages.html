{% for message in messages %}
  <div class="flex {% if message.role == 'user' %}justify-end{% else %}justify-start{% endif %}">
    
    <div class="
      max-w-[85%] sm:max-w-[70%]
      px-4 py-2
      rounded-2xl
      text-sm sm:text-base
      leading-relaxed
      break-words whitespace-pre-wrap
      shadow-sm
      {% if message.role == 'user' %}
        bg-blue-600 text-white rounded-bl-md
      {% else %}
        bg-gray-700 text-gray-100 rounded-br-md
      {% endif %}
    ">
      {{ message.content }}
    </div>

  </div>
{% empty %}
  <p class="text-gray-400 text-sm text-center">Nenhuma mensagem ainda</p>
{% endfor %}

<!-- typing (mantido) -->
<div id="typing-indicator" class="htmx-indicator flex justify-start">
  <div class="bg-gray-700 px-4 py-2 rounded-2xl flex gap-1.5 shadow-sm">
    <span class="typing-dot w-1.5 h-1.5 bg-gray-300 rounded-full"></span>
    <span class="typing-dot w-1.5 h-1.5 bg-gray-300 rounded-full"></span>
    <span class="typing-dot w-1.5 h-1.5 bg-gray-300 rounded-full"></span>
  </div>
</div>
